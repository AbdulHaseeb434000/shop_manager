name: shop_manager
description: Offline Small Shop Management App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  # PDF generation
  pdf: ^3.10.8
  printing: ^5.13.1
  # File sharing & picking
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  # File system
  path_provider: ^2.1.3
  # UI helpers
  intl: ^0.19.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0
  lottie: ^3.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
